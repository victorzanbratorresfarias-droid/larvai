<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Larvai FREE</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    #galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📚 Larvai FREE</h1>

<button onclick="login()">Login con Google</button>
<button onclick="logout()">Logout</button>

<p id="estado">No conectado ❌</p>

<div id="subida" style="display:none;">
  <input type="file" id="fileInput">
  <button onclick="subir()">Subir cómic</button>
</div>

<h2>Galería 🌍</h2>
<div id="galeria"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

// 🔥 TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyD_oRaTSVrWTPcOTOImLrDUKj8ZE2Qgonw",
  authDomain: "larvai-5b3a5.firebaseapp.com",
  projectId: "larvai-5b3a5",
  storageBucket: "larvai-5b3a5.firebasestorage.app",
  messagingSenderId: "307118531666",
  appId: "1:307118531666:web:53fe27aa1c72e8dd34eb8b"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

let usuario = null

const estado = document.getElementById("estado")
const galeria = document.getElementById("galeria")
const subida = document.getElementById("subida")

// LOGIN
window.login = async () => {
  const provider = new GoogleAuthProvider()
  await signInWithPopup(auth, provider)
}

window.logout = async () => {
  await signOut(auth)
}

onAuthStateChanged(auth, user => {
  if (user) {
    usuario = user
    estado.innerText = "Conectado: " + user.displayName
    subida.style.display = "block"
  } else {
    usuario = null
    estado.innerText = "No conectado ❌"
    subida.style.display = "none"
  }
})

// convertir imagen a base64
function convertirBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader()
    reader.readAsDataURL(file)
    reader.onload = () => resolve(reader.result)
  })
}

// SUBIR
window.subir = async () => {
  if (!usuario) return alert("Inicia sesión")

  const file = document.getElementById("fileInput").files[0]
  if (!file) return alert("Selecciona imagen")

  const base64 = await convertirBase64(file)

  await addDoc(collection(db, "comics"), {
    img: base64,
    user: usuario.displayName
  })
}

// MOSTRAR
onSnapshot(collection(db, "comics"), snapshot => {
  galeria.innerHTML = ""

  snapshot.forEach(doc => {
    const data = doc.data()

    const img = document.createElement("img")
    img.src = data.img

    galeria.appendChild(img)
  })
})
</script>

</body>
</html>
